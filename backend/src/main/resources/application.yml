server:
  port: 8080

spring:
  application:
    name: woorilog-backend
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:woorilog}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
    username: ${MYSQL_USER:woorilog}
    password: ${MYSQL_PASSWORD:woorilog_local_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true

app:
  auth:
    dev-login-enabled: ${DEV_LOGIN_ENABLED:false}
  kakao:
    client-id: ${KAKAO_CLIENT_ID:}
    client-secret: ${KAKAO_CLIENT_SECRET:}
    redirect-uri: ${KAKAO_REDIRECT_URI:}
  jwt:
    secret: ${JWT_SECRET:woorilog-secret-key-for-development-should-be-long-enough-for-hmac-sha256}
    access-token-ttl-seconds: ${JWT_ACCESS_TOKEN_TTL_SECONDS:1800}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TOKEN_TTL_SECONDS:1209600}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
