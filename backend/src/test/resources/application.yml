spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  sql:
    init:
      mode: never

app:
  auth:
    dev-login-enabled: true
  jwt:
    secret: woorilog-secret-key-for-development-should-be-long-enough-for-hmac-sha256
    access-token-ttl-seconds: 1800
    refresh-token-ttl-seconds: 1209600
  cors:
    allowed-origins: http://localhost:5173
